<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangle Bliss - Secure Checkout</title>
    <link rel="stylesheet" href="checkout.css">
</head>
<body>

    <header>
        <h1>BANGLE BLISS CHECKOUT</h1>
        <p>Review your custom design and complete your order.</p>
    </header>

    <nav>
        <a href="index.html">Design Studio</a>
        <a href="gallery.html">Inspiration Gallery</a>
        <a href="checkout.html" class="active">Checkout</a>
    </nav>

    <main class="container">
        <h2 class="section-title">Complete Your Order</h2>
        
        <div class="checkout-layout">
            <div class="order-summary-box">
                <h3>Your Custom Design:</h3>
                <div class="preview-window" style="padding: 20px 10px; margin: 15px 0;">
                    <div class="bracelet-string" id="checkoutBraceletString">
                        </div>
                </div>
                
                <div class="price-row">
                    <span>Base Bracelet Fee:</span>
                    <span>$5.00</span>
                </div>
                <div class="price-row">
                    <span>Beads Used (<span id="beadCountText">0</span>):</span>
                    <span id="beadPriceText">$0.00</span>
                </div>
                <div class="price-row total-row">
                    <span>Total Amount Due:</span>
                    <span id="totalPriceText">$5.00</span>
                </div>
            </div>

            <div>
                <form id="orderForm" onsubmit="submitOrder(event)">
                    <div class="form-group">
                        <label for="userName">Full Name</label>
                        <input type="text" id="userName" required placeholder="Jane Doe">
                    </div>
                    <div class="form-group">
                        <label for="userAddress">Shipping Address</label>
                        <input type="text" id="userAddress" required placeholder="123 Sparkle Lane">
                    </div>
                    <div class="form-group">
                        <label for="userEmail">Email Address</label>
                        <input type="email" id="userEmail" required placeholder="jane@example.com">
                    </div>
                    <button type="submit" class="btn btn-order" style="width: 100%;">Place Order 🎉</button>
                </form>
            </div>
        </div>
    </main>

    <footer><p>&copy; 2026 Bangle Bliss Studio | AP CSP Final Project</p></footer>

    <script>
        // 1. Grab the saved bracelet data from the browser's local storage memory
        const storedData = localStorage.getItem('savedBracelet');
        const beadArray = storedData ? JSON.parse(storedData) : [];
        const container = document.getElementById('checkoutBraceletString');

        // 2. Loop through the saved colors and dynamically draw the beads onto the screen
        beadArray.forEach(color => {
            const bead = document.createElement('div');
            bead.className = 'bead';
            bead.style.backgroundColor = color;
            container.appendChild(bead);
        });

        // 3. AP CSP Math: Calculate pricing ($0.25 per individual bead + $5 base price)
        const count = beadArray.length;
        const beadCost = count * 0.25;
        const total = 5.00 + beadCost;

        // 4. Update the text elements on the screen with our calculated values
        document.getElementById('beadCountText').innerText = count;
        document.getElementById('beadPriceText').innerText = `$${beadCost.toFixed(2)}`;
        document.getElementById('totalPriceText').innerText = `$${total.toFixed(2)}`;

        // 5. Handle form submission
        function submitOrder(e) {
            e.preventDefault(); // Prevents the page from refreshing automatically
            const name = document.getElementById('userName').value;
            alert(`Thank you for your order, ${name}! Your custom Bangle Bliss order has been processed successfully (Mock Simulation).`);
            
            // Clear out the memory and take them back to the studio start page
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
